<!-- Fixed full-viewport canvas layers (back -> front): stars, nebula, fog. -->
<canvas #stars  class="c-stars"  aria-hidden="true"></canvas>
<canvas #nebula class="c-nebula" aria-hidden="true"></canvas>
<canvas #fog    class="c-fog"    aria-hidden="true"></canvas>

<!-- Hard dark scrim over the top half so fog never rises into the headline. -->
<div class="top-scrim" aria-hidden="true"></div>
